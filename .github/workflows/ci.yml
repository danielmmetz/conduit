name: ci

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate embedded WASM bundle
        run: go generate ./cmd/conduit-server

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -timeout 2m

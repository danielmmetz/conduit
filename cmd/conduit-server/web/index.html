<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>conduit</title>
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/wasm_exec.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <header class="top">
      <h1>conduit</h1>
      <p class="tagline">Encrypted transfer · short code</p>
    </header>

    <main>
      <label class="field" id="serverField" style="display: none">
        <span>Server</span>
        <input type="url" id="serverUrl" autocomplete="off" />
      </label>

      <section class="panel" id="sendPanel">
        <h2>Send</h2>
        <div
          class="dropzone"
          id="dropzone"
          tabindex="0"
          aria-label="Send a file"
        >
          <p>Drop or <button type="button" id="pickBtn">choose</button> a file</p>
          <input type="file" id="fileInput" hidden />
        </div>
        <label class="field paste-field">
          <textarea
            id="pasteTarget"
            rows="3"
            autocomplete="off"
            spellcheck="true"
            aria-label="Paste to send text"
            placeholder="Paste text"
          ></textarea>
        </label>
        <p id="sendFileName" class="muted"></p>
        <div id="sendCode" class="code-box" hidden>
          <p class="label">Code</p>
          <code id="codeText"></code>
          <div class="share-block-wrap">
            <p class="label">Link</p>
            <div class="copy-row">
              <code id="shareBrowserUrl" class="share-code"></code>
              <button type="button" class="copy-inline" id="copyBrowserUrlBtn">Copy</button>
            </div>
          </div>
          <div class="share-block-wrap">
            <p class="label">CLI</p>
            <div class="copy-row">
              <code id="shareCliCmd" class="share-code"></code>
              <button type="button" class="copy-inline" id="copyCliCmdBtn">Copy</button>
            </div>
          </div>
          <div id="qrHost"></div>
        </div>
        <div class="progress" id="sendProgress" hidden>
          <div class="bar" id="sendBar"></div>
        </div>
        <p id="sendStatus" class="status" role="status"></p>
      </section>

      <section class="panel" id="recvPanel">
        <h2>Receive</h2>
        <label class="field">
          <span>Code</span>
          <input
            type="text"
            id="recvCode"
            placeholder="code"
            autocomplete="off"
            spellcheck="false"
          />
        </label>
        <button type="button" id="recvBtn">Receive</button>
        <div class="progress" id="recvProgress" hidden>
          <div class="bar" id="recvBar"></div>
        </div>
        <p id="recvStatus" class="status" role="status"></p>
        <div id="recvText" class="text-box" hidden>
          <div class="text-box-header">
            <span class="muted" id="recvTextLabel">Text</span>
            <button type="button" id="recvCopyBtn">Copy</button>
          </div>
          <pre id="recvTextBody"></pre>
        </div>
      </section>
    </main>

    <footer class="foot">
      <p class="muted">Relay pairs peers; traffic is encrypted.</p>
    </footer>
  </body>
</html>

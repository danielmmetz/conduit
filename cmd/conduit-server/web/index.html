<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>conduit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/wasm_exec.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <header class="top">
      <a href="/" class="brand" aria-label="Start a new session">
        <h1>conduit</h1>
        <p class="tagline">Encrypted transfer · short code</p>
      </a>
      <a
        href="https://github.com/danielmmetz/conduit"
        class="repo-link"
        aria-label="View source on GitHub"
      >
        <svg viewBox="0 0 16 16" width="24" height="24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
      </a>
    </header>

    <main>
      <label class="field" id="serverField" style="display: none">
        <span>Server</span>
        <input type="url" id="serverUrl" autocomplete="off" />
      </label>

      <section class="panel" id="idlePanel">
        <div class="create-block">
          <button type="button" id="createBtn" class="create-big">+ Create</button>
          <div class="divider">or</div>
          <form id="joinForm" class="open-row">
            <input
              type="text"
              id="phraseInput"
              placeholder="code"
              autocomplete="off"
              spellcheck="false"
              aria-label="Session code"
            />
            <button type="submit" id="joinBtn" disabled>Join</button>
          </form>
        </div>
        <p id="idleStatus" class="status" role="status"></p>
      </section>

      <section class="panel" id="pairedPanel" hidden>
        <div id="hostCode" class="code-box" hidden>
          <p class="card-title">Session</p>
          <code id="codeText"></code>
          <div class="copy-row">
            <span class="label">Link</span>
            <code id="shareBrowserUrl" class="share-code"></code>
            <button type="button" class="copy-inline" id="copyBrowserUrlBtn">Copy</button>
          </div>
          <div class="copy-row">
            <span class="label">CLI</span>
            <code id="shareCliCmd" class="share-code"></code>
            <button type="button" class="copy-inline" id="copyCliCmdBtn">Copy</button>
          </div>
          <div id="qrHost"></div>
        </div>

        <div class="send-grid">
          <div
            class="dropzone"
            id="dropzone"
            tabindex="0"
            aria-label="Send files or a folder"
          >
            <p>Drop files or a folder</p>
            <p>or <button type="button" id="pickBtn">click to choose</button></p>
            <input type="file" id="fileInput" hidden multiple />
          </div>
          <button
            type="button"
            class="paste-field"
            id="pasteBtn"
            aria-label="Send text from clipboard"
          >
            <p>Send clipboard</p>
            <p>or paste</p>
          </button>
        </div>

        <ul id="transferList" class="transfer-list" hidden></ul>

        <p id="pairedStatus" class="status" role="status"></p>
        <div class="paired-actions">
          <button type="button" id="closeBtn" class="close-inline">End session</button>
        </div>
      </section>

      <section class="panel" id="closedPanel" hidden>
        <p class="muted">Session ended.</p>
        <button type="button" id="reopenBtn">Open another</button>
      </section>
    </main>

    <footer class="foot">
      <p class="muted">Relay pairs peers; traffic is encrypted.</p>
    </footer>
  </body>
</html>

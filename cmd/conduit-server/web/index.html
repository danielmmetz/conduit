<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>conduit</title>
    <link rel="stylesheet" href="/style.css" />
    <script defer src="/wasm_exec.js"></script>
    <script defer src="/app.js"></script>
  </head>
  <body>
    <header class="top">
      <a href="/" class="brand" aria-label="Start a new session">
        <h1>conduit</h1>
        <p class="tagline">Encrypted transfer · short code</p>
      </a>
    </header>

    <main>
      <label class="field" id="serverField" style="display: none">
        <span>Server</span>
        <input type="url" id="serverUrl" autocomplete="off" />
      </label>

      <section class="panel" id="idlePanel">
        <p class="muted instructions">
          Type a code to join a session, or leave blank to create one.
        </p>
        <form id="idleForm" class="open-row">
          <input
            type="text"
            id="phraseInput"
            placeholder="phrase (or blank to create)"
            autocomplete="off"
            spellcheck="false"
            aria-label="Session phrase"
          />
          <button type="submit" id="openBtn">Open</button>
        </form>
        <p id="idleStatus" class="status" role="status"></p>
      </section>

      <section class="panel" id="pairedPanel" hidden>
        <div id="hostCode" class="code-box" hidden>
          <p class="label">Code</p>
          <code id="codeText"></code>
          <div class="share-block-wrap">
            <p class="label">Link</p>
            <div class="copy-row">
              <code id="shareBrowserUrl" class="share-code"></code>
              <button type="button" class="copy-inline" id="copyBrowserUrlBtn">Copy</button>
            </div>
          </div>
          <div class="share-block-wrap">
            <p class="label">CLI</p>
            <div class="copy-row">
              <code id="shareCliCmd" class="share-code"></code>
              <button type="button" class="copy-inline" id="copyCliCmdBtn">Copy</button>
            </div>
          </div>
          <div id="qrHost"></div>
        </div>

        <div
          class="dropzone"
          id="dropzone"
          tabindex="0"
          aria-label="Send a file"
        >
          <p>Drop or <button type="button" id="pickBtn">choose</button> a file to send</p>
          <input type="file" id="fileInput" hidden />
        </div>
        <label class="field paste-field">
          <textarea
            id="pasteTarget"
            rows="3"
            autocomplete="off"
            spellcheck="true"
            aria-label="Paste to send text"
            placeholder="Paste text to send"
          ></textarea>
        </label>

        <ul id="transferList" class="transfer-list" hidden></ul>

        <p id="pairedStatus" class="status" role="status"></p>
        <div class="paired-actions">
          <button type="button" id="closeBtn" class="close-inline">End session</button>
        </div>
      </section>

      <section class="panel" id="closedPanel" hidden>
        <p class="muted">Session ended.</p>
        <button type="button" id="reopenBtn">Open another</button>
      </section>
    </main>

    <footer class="foot">
      <p class="muted">Relay pairs peers; traffic is encrypted.</p>
    </footer>
  </body>
</html>
